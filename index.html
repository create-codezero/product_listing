<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <title>Product Explorer Pro</title>

    <style>
      body {
        background: radial-gradient(circle at top, #eef2ff, #f8fafc);
      }

      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
      }

      .card-hover {
        transition: all 0.2s ease;
      }

      .card-hover:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      .loader {
        border: 3px solid #eee;
        border-top: 3px solid #3b82f6;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        animation: spin 0.8s linear infinite;
      }

      .search-container{
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        border-radius: 1rem;
        overflow: hidden;

        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);

        border: 1px solid #ddd;
        display: flex;

        max-width: 600px;
        width: 100%;
      }

      .search-container input, .search-container select{
        border: none;
        outline: none;
        background: transparent;
        padding: 0.7rem 1rem;
      }

      .search-container select{
        border-left: 1px solid #ddd;
        box-sizing: border-box;
      }

      .search-container button{
        border: none;
        outline: none;
        background: #3b82f6;
        color: white;
        padding: 0.7rem 1.2rem;
        cursor: pointer;
      }

      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div class="max-w-6xl mx-auto p-4">
      <!-- Header -->
      <div
        class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6"
      >
        <h1 class="text-3xl font-bold flex items-center gap-2">
          <i class="fa-solid fa-bag-shopping text-blue-600"></i>
          Product Explorer
        </h1>

        <!-- Search -->
      </div>

      <!-- Filters -->
      <div class="flex gap-3 mb-6 justify-center w-full">


        <div class="flex gap-2 w-full search-container">
          <input
            id="search"
            type="text"
            placeholder="Search products..."
            class="w-full p-2 border rounded-lg glass outline-none"
          />

          <select id="category" class="p-2 border glass">
            <option value="">All Categories</option>
          </select>

          <button
            onclick="resetAndFetch()"
            class="bg-blue-600 text-white px-4 py-2 hover:bg-blue-700"
          >
            Apply
          </button>
        </div>


      </div>

      <!-- Products Grid -->
      <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

      <!-- Loader -->
      <div id="loader" class="flex justify-center my-6 hidden">
        <p>Restarting Render Server, It can take 1min first time then you can see the real spped.</p>
        <div class="loader"></div>
      </div>

      <!-- Empty State -->
      <div id="empty" class="text-center text-gray-500 hidden mt-10">
        No products found 😢
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
